services:
  # ============================================
  # Couple Calendar Project
  # ============================================
  zha-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zha-backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-this-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - PORT=3001
      - NODE_ENV=production
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:3001}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID:-}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/google-oauth-credentials.json:/app/google-oauth-credentials.json:ro
      - ./backend/google-oauth-tokens.json:/app/google-oauth-tokens.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - apps-network

  zha-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    container_name: zha-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      - NODE_ENV=production
    depends_on:
      zha-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - apps-network

  # ============================================
  # Eco Monitoring Project
  # ============================================
  eco-backend:
    build:
      context: ./vision/backend
      dockerfile: Dockerfile
    container_name: eco-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - CORS_ORIGINS=${ECO_CORS_ORIGINS:-http://localhost:3002,http://85.202.193.35:3002}
    volumes:
      - ./vision/backend/ml_models:/app/ml_models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - apps-network

  eco-frontend:
    build:
      context: ./vision/frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${ECO_NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: eco-frontend
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${ECO_NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NODE_ENV=production
    depends_on:
      eco-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - apps-network

  # Mock Data Sender (optional, only runs with --profile mock)
  eco-mock-sender:
    build:
      context: ./vision/scripts
      dockerfile: Dockerfile
    container_name: eco-mock-sender
    environment:
      - API_URL=http://eco-backend:8000/api/data
      - SEND_INTERVAL=30
    depends_on:
      eco-backend:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - mock
    networks:
      - apps-network

networks:
  apps-network:
    driver: bridge
